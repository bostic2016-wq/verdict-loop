models:
  director: openrouter/anthropic/claude-sonnet-4
  vision_critic: openrouter/google/gemini-2.5-flash
  # openrouter = Images API via OpenRouter (uses OPENROUTER_API_KEY)
  image_backend: openrouter
  # Which image profile to use for panels (fallback-chain mode).
  # - nano_banana_flux: Nano Banana Pro → FLUX.2 Pro
  # - anime_seedream: Seedream 4.5 → FLUX.2 Pro
  image_profile: nano_banana_flux
  # fallback = try profile chain until one succeeds
  # all_selected = generate with every checked model (compare + Desktop folders)
  image_run_mode: fallback
  image_models_selected:
    - google/gemini-3-pro-image
    - bytedance-seed/seedream-4.5
  image_catalog:
    - id: google/gemini-3-pro-image
      label: Nano Banana Pro
      family: nano_banana
    - id: google/gemini-2.5-flash-image-preview
      label: Nano Banana Flash
      family: nano_banana
    - id: bytedance-seed/seedream-4.5
      label: Seedream 4.5
      family: seedream
    - id: black-forest-labs/flux.2-pro
      label: FLUX.2 Pro
      family: flux
  # Fallback chain if no profile-specific chain is found.
  image_model_chain:
    - google/gemini-3-pro-image
    - black-forest-labs/flux.2-pro
  image_profiles:
    nano_banana_flux:
      chain:
        - google/gemini-3-pro-image
        - black-forest-labs/flux.2-pro
    anime_seedream:
      chain:
        - bytedance-seed/seedream-4.5
        - black-forest-labs/flux.2-pro

openrouter:
  image_url: https://openrouter.ai/api/v1/images

fallback_models:
  director: openrouter/google/gemini-2.5-flash
  vision_critic: openrouter/google/gemini-2.5-flash

# Local prompt compiler is faster + better at forcing full cast into the prompt
prompt_compile:
  use_llm: false

vision_qa:
  enabled: true
  pass_score: 0.60
  max_retries: 1   # was 2 — each retry = another FLUX + vision call

# Sequence review was the main "next 5" slowdown (extra vision + optional full regenerations)
sequence_qa:
  enabled: false
  pass_score: 0.65
  regen_on_fail: false

pilot:
  panel_count: 5
  batch_size: 5

video:
  enabled: false
  model: google/veo-3.1-lite
  duration: 4        # seconds
  resolution: "720p"
  # Quoted — unquoted 16:9 is parsed by YAML as the number 969
  aspect_ratio: "16:9"
  max_wait_seconds: 600
  motion_style: subtle
  qa:
    enabled: true
    pass_score: 0.65
    auto_retry: false

costs:
  per_1k_tokens_usd: 0.002   # rough estimate for LLM calls (for usage display only)
  per_image_usd: 0.03        # approximate image cost
  per_video_usd: 0.20        # approximate short video clip cost

# Auto-copy every generated panel to ~/Desktop/Manga Storyboard/<Model>/
# Set enabled: false or MANGA_DESKTOP_EXPORT=0 to turn off.
desktop_export:
  enabled: true

paths:
  library_dir: library
  outputs_dir: outputs/runs
  styles_dir: styles

defaults:
  aesthetic: jjk_inspired
  image_width: 768
  image_height: 1024
