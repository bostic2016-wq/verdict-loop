models:
  director: openrouter/anthropic/claude-sonnet-4
  vision_critic: openrouter/google/gemini-2.5-flash
  # openrouter = FLUX via OpenRouter (uses OPENROUTER_API_KEY)
  # auto | mock | fal_illustrious | pollinations | openrouter_gpt_image
  image_backend: openrouter
  image_model: black-forest-labs/flux.2-pro

openrouter:
  image_url: https://openrouter.ai/api/v1/images

fallback_models:
  director: openrouter/google/gemini-2.5-flash
  vision_critic: openrouter/google/gemini-2.5-flash

vision_qa:
  enabled: true
  pass_score: 0.65
  max_retries: 2

sequence_qa:
  enabled: true
  pass_score: 0.65

pilot:
  panel_count: 5
  batch_size: 5

paths:
  library_dir: library
  outputs_dir: outputs/runs
  styles_dir: styles

defaults:
  aesthetic: jjk_inspired
  image_width: 768
  image_height: 1024
