id: jjk_inspired
name: JJK-inspired
description: >
  Modern battle-shonen aesthetic — sharp ink, high-contrast shadows,
  dynamic camera tilt, dense action framing. Inspired by contemporary
  shonen battle manga line language (not a copy of any specific series).

positive_tags: >
  professional full-color manga panel in the style of a modern dark
  battle-shonen anime adaptation (Jujutsu Kaisen-inspired line language):
  rough, energetic G-pen ink linework with variable line weight over rich
  color, deep high-contrast cel shading, moody desaturated urban color
  palette with striking accent colors, gritty cross-hatching on faces during
  tension, urban Japan settings with realistic perspective, sharp angular
  jawlines and intense hooded eyes, dynamic foreshortened action poses,
  dramatic low-angle and dutch-tilt camera work, cinematic negative space,
  raw kinetic impact framing

# Only injected when the script beat explicitly calls for powers/energy
power_tags: >
  crackling cursed-energy style aura with jagged ink strokes,
  glowing power emanation surrounding the character

negative_tags: >
  photorealistic, photograph, 3d render, soft blur, watercolor, pastel,
  speech bubble, text, watermark, signature, logo, ui, border, frame,
  deformed hands, extra limbs, fused fingers, lowres, blurry, worst quality,
  western comic, disney, chibi, cute pastel anime

settings:
  guidance_scale: 6.5
  num_inference_steps: 28
  style_strength: 0.85

framing_hints:
  - dutch angles for tension
  - extreme close-ups on eyes and hands for emotion
  - wide establishing shots with strong negative space
  - speed lines sparingly for impact moments
