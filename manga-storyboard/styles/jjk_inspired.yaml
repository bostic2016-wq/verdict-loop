id: jjk_inspired
name: JJK-inspired
description: >
  Modern battle-shonen aesthetic — sharp ink, high-contrast shadows,
  dynamic camera tilt, dense action framing. Inspired by contemporary
  shonen battle manga line language (not a copy of any specific series).

positive_tags: >
  professional black-and-white manga panel in the style of a modern dark
  battle-shonen weekly serialization (Jujutsu Kaisen-inspired line language):
  rough, energetic G-pen inking with variable line weight, heavy solid black
  spot shadows, gritty cross-hatching on faces during tension, screentone
  gradients for atmosphere, urban Japan settings with realistic perspective,
  sharp angular jawlines and intense hooded eyes, dynamic foreshortened
  action poses, cursed-energy style crackling aura effects drawn with jagged
  ink strokes, dramatic low-angle and dutch-tilt camera work, cinematic
  negative space, raw kinetic impact frames

negative_tags: >
  photorealistic, photograph, 3d render, soft blur, watercolor, pastel,
  speech bubble, text, watermark, signature, logo, ui, border, frame,
  deformed hands, extra limbs, fused fingers, lowres, blurry, worst quality,
  western comic, disney, chibi, cute pastel anime

settings:
  guidance_scale: 6.5
  num_inference_steps: 28
  style_strength: 0.85

framing_hints:
  - dutch angles for tension
  - extreme close-ups on eyes and hands for emotion
  - wide establishing shots with strong negative space
  - speed lines sparingly for impact moments
