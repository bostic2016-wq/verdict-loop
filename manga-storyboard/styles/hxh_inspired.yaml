id: hxh_inspired
name: HxH-inspired
description: >
  Adventure shonen aesthetic — cleaner proportions, softer screentone feel,
  expressive character acting, nen-aura language for power moments.
  Inspired by classic adventure manga pacing (not a copy of any specific series).

positive_tags: >
  professional full-color manga panel in the style of a classic 90s-2000s
  adventure shonen anime (Hunter x Hunter-inspired line language):
  clean confident pen lines with rounded youthful character proportions,
  bright saturated adventure color palette, large expressive eyes with
  simple highlights, soft cel shading, hand-drawn detailed natural and city
  backgrounds, clear readable silhouettes, expressive cartoony reaction
  faces mixed with sudden menacing hyper-detailed close-ups for dramatic
  shifts, balanced panel composition with strong storytelling clarity
  over spectacle

# Only injected when the script beat explicitly calls for powers/energy
power_tags: >
  nen-style radiating aura lines, visible glowing energy
  emanating from the character

negative_tags: >
  photorealistic, photograph, 3d render, soft blur, watercolor,
  speech bubble, text, watermark, signature, logo, ui, border, frame,
  deformed hands, extra limbs, fused fingers, lowres, blurry, worst quality,
  hyper-violent gore, excessive dutch angle, muddy shadows, western comic

settings:
  guidance_scale: 6.0
  num_inference_steps: 28
  style_strength: 0.8

framing_hints:
  - clear establishing shots before intimate moments
  - character acting over pure spectacle
  - reaction panels after reveals
  - softer contrast for quiet dialogue; harder ink for nen/power beats
