debate:
  max_rounds: 2
  brief_max_rounds: 1
  pass_score: 8
  detail: brief

creative:
  enabled: true
  max_image_rounds: 2
  pass_score: 7
  image_count: 2
  width: 1024
  height: 1024
  generate_on_reject: true
  # openrouter | pollinations  (falls back to pollinations if OpenRouter has no credits)
  image_provider: openrouter

models:
  # OpenRouter lineup (one key, per-role models). IDs verified against the live catalog.
  scout: openrouter/openai/gpt-5.4-mini
  advocate: openrouter/x-ai/grok-4.5
  # Different family from Scout so debate contrast isn't Advocate-only
  skeptic: openrouter/google/gemini-2.5-flash
  judge: openrouter/anthropic/claude-fable-5
  promoter: openrouter/google/gemini-2.5-flash
  image_critic: openrouter/google/gemini-2.5-flash
  image_model: black-forest-labs/flux.2-pro

