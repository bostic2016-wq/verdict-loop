debate:
  max_rounds: 2
  pass_score: 8

creative:
  enabled: true
  max_image_rounds: 2
  pass_score: 7
  image_count: 2
  width: 1024
  height: 1024
  generate_on_reject: true
  # openrouter | pollinations  (falls back to pollinations if OpenRouter has no credits)
  image_provider: openrouter

models:
  # OpenRouter lineup (one key, per-role models). IDs verified against the live catalog.
  scout: openrouter/openai/gpt-5-mini
  advocate: openrouter/x-ai/grok-4.20
  skeptic: openrouter/openai/gpt-5-mini
  judge: openrouter/anthropic/claude-sonnet-5
  promoter: openrouter/google/gemini-2.5-flash
  image_critic: openrouter/google/gemini-2.5-flash
  image_model: black-forest-labs/flux.2-pro

fallback_models:
  # Free-tier safety net if OpenRouter is unreachable or out of credits
  scout: groq/llama-3.1-8b-instant
  advocate: groq/llama-3.1-8b-instant
  skeptic: groq/llama-3.1-8b-instant
  judge: gemini/gemini-flash-latest
  promoter: gemini/gemini-flash-latest
  image_critic: gemini/gemini-flash-latest

pollinations:
  base_url: https://image.pollinations.ai/prompt

openrouter:
  image_url: https://openrouter.ai/api/v1/images

paths:
  outputs_dir: outputs/runs
